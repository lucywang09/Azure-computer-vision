<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Photo Inspector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>📸 AI Photo Inspector</h1>
    <p class="subtitle">Upload an image and let AI analyze it</p>

    <div class="card">

      <input type="file" id="fileInput" accept="image/*" />

      <img id="preview" class="hidden" />

      <button onclick="analyzeImage()">Analyze Image</button>

      <div id="loader" class="hidden">Analyzing image...</div>

      <div id="result" class="hidden">
        <h3>📝 Caption</h3>
        <p id="caption"></p>

        <h3>🏷 Tags</h3>
        <div id="tags"></div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
